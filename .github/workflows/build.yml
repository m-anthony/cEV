name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Get App Version
        id: app-version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ "$VERSION" == refs/* ]]; then VERSION="test-manual"; fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Get Java version from TOML
        id: java-version
        shell: bash
        run: |
          VERSION=$(grep "^java =" gradle/libs.versions.toml | cut -d'"' -f2)
          echo "JAVA_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up JDK ${{ steps.java-version.outputs.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java-version.outputs.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Preflop Equity File
        uses: actions/cache@v4
        with:
          path: cev-core/build/generated/resources/preflop_equity.dat
          key: ${{ runner.os }}-preflop-equity-v1

      - name: Grant execute permission for gradlew
        if: runner.os == 'macOS'
        run: chmod +x gradlew

      - name: Build Distributions
        run: ./gradlew packageDistributionForCurrentOS

      - name: Build Portable Zip
        run: ./gradlew :cev-ui:createDistributable

      - name: Create Portable Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ steps.app-version.outputs.VERSION }}"
          Compress-Archive -Path cev-ui/build/compose/binaries/main/app/* -DestinationPath "cev-ui/build/compose/binaries/main/Spin-cEV-Portable-Win-$ver.zip"

      - name: Create Portable Archive (macOS)
        if: runner.os == 'macOS'
        run: |
          ver="${{ steps.app-version.outputs.VERSION }}"
          cd cev-ui/build/compose/binaries/main/app
          zip -r ../Spin-cEV-Portable-Mac-$ver.zip .

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-path: |
            ${{ runner.os == 'Windows' && 'cev-ui/build/compose/binaries/main/msi/*.msi' || '' }}
            ${{ runner.os == 'macOS' && 'cev-ui/build/compose/binaries/main/dmg/*.dmg' || '' }}
            cev-ui/build/compose/binaries/main/*.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binaries
          path: |
            cev-ui/build/compose/binaries/main/msi/*.msi
            cev-ui/build/compose/binaries/main/dmg/*.dmg
            cev-ui/build/compose/binaries/main/*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          prerelease: true
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'manual-test' }}
          draft: false
          files: |
            cev-ui/build/compose/binaries/main/msi/*.msi
            cev-ui/build/compose/binaries/main/dmg/*.dmg
            cev-ui/build/compose/binaries/main/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}