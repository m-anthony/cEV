name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            display_os: "Windows"
          - os: macos-latest
            arch: x64
            display_os: "macOS-Intel"
          - os: macos-latest
            arch: arm64
            display_os: "macOS-Apple-Silicon"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Get App Version
        id: app-version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ "$VERSION" == refs/* ]]; then VERSION="test-manual"; fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Get Java version from TOML
        id: java-version
        shell: bash
        run: |
          VERSION=$(grep "^java =" gradle/libs.versions.toml | cut -d'"' -f2)
          echo "JAVA_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up JDK ${{ steps.java-version.outputs.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java-version.outputs.JAVA_VERSION }}
          distribution: 'temurin'
          architecture: ${{ matrix.arch }}
          cache: 'gradle'

      - name: Cache Preflop Equity File
        uses: actions/cache@v4
        with:
          path: cev-core/build/generated/resources/preflop_equity.dat
          key: ${{ runner.os }}-preflop-equity-v1

      - name: Grant execute permission for gradlew
        if: runner.os == 'macOS'
        run: chmod +x gradlew

      - name: Build Distributions
        run: ./gradlew packageDistributionForCurrentOS -Pcompose.desktop.target=mac-${{ matrix.arch }}
        if: runner.os == 'macOS'

      - name: Build Distributions (Windows)
        run: ./gradlew packageDistributionForCurrentOS
        if: runner.os == 'Windows'

      - name: Build Portable Zip
        run: ./gradlew :cev-ui:createDistributable

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-path: |
            ${{ runner.os == 'Windows' && 'cev-ui/build/compose/binaries/main/msi/*.msi' || '' }}
            ${{ runner.os == 'macOS' && 'cev-ui/build/compose/binaries/main/dmg/*.dmg' || '' }}
            cev-ui/build/compose/binaries/main/*.zip

      - name: Prepare Final Binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ steps.app-version.outputs.VERSION }}"
          $osName = "${{ matrix.display_os }}"
          
          # 1. Renommage du MSI
          Get-ChildItem "cev-ui/build/compose/binaries/main/msi/*.msi" | ForEach-Object {
              Rename-Item $_.FullName -NewName "Spin-cEV-Installer-$osName-$ver.msi"
          }
          
          # 2. Création du ZIP Portable
          Compress-Archive -Path "cev-ui/build/compose/binaries/main/app/*" -DestinationPath "cev-ui/build/compose/binaries/main/Spin-cEV-Portable-$osName-$ver.zip"

      - name: Prepare Final Binaries (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${{ steps.app-version.outputs.VERSION }}"
          OS_NAME="${{ matrix.display_os }}"
          
          # 1. Renommage du DMG
          cd cev-ui/build/compose/binaries/main/dmg
          for f in *.dmg; do
            mv "$f" "Spin-cEV-Installer-$OS_NAME-$VERSION.dmg"
          done
          
          # 2. Création du ZIP Portable
          cd ../app
          zip -r "../Spin-cEV-Portable-$OS_NAME-$VERSION.zip" .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}-binaries
          path: |
            cev-ui/build/compose/binaries/main/msi/*.msi
            cev-ui/build/compose/binaries/main/dmg/*.dmg
            cev-ui/build/compose/binaries/main/*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          prerelease: true
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'manual-test' }}
          draft: false
          files: |
            cev-ui/build/compose/binaries/main/msi/*.msi
            cev-ui/build/compose/binaries/main/dmg/*.dmg
            cev-ui/build/compose/binaries/main/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}